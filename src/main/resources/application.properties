spring.application.name=taskapi

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb
spring.datasource.username=root
spring.datasource.password=Nikhil9136
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT
jwt.secret=mysupersecuresecretkeythatisatleast32charslong
jwt.expiration=86400000

# ====================== SpringDoc / Swagger Fix ======================
# ====================== SWAGGER / SPRINGDOC ======================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

springdoc.swagger-ui.url=/api/v1/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.swagger-ui.config-url=/api/v1/v3/api-docs/swagger-config